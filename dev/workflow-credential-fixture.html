<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Credential Fixture Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        background: #f4efe6;
        color: #1d1c1a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(209, 147, 74, 0.16), transparent 38%),
          linear-gradient(135deg, #f7f2ea, #efe4d7);
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 1.5rem 4rem rgba(81, 54, 18, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1.25rem;
        color: #5d5345;
      }

      form {
        display: grid;
        gap: 0.875rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.9rem;
        font-weight: 600;
      }

      input {
        padding: 0.75rem 0.9rem;
        border: 1px solid #cdb9a1;
        border-radius: 0.8rem;
        font: inherit;
      }

      button {
        margin-top: 0.5rem;
        padding: 0.85rem 1rem;
        border: 0;
        border-radius: 0.9rem;
        background: #9e5b1e;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      #status {
        margin-top: 1rem;
        min-height: 1.25rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Credential Fixture</h1>
      <p>Submit the known demo credentials to complete the flow.</p>
      <form id="login-form">
        <label>
          Username
          <input id="username" name="username" autocomplete="username" />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Authenticate</button>
      </form>
      <div id="status" aria-live="polite"></div>
    </main>
    <script>
      const expected = {
        username: "demo",
        password: "demo-demo",
      };

      const form = document.getElementById("login-form");
      const status = document.getElementById("status");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const username = String(formData.get("username") ?? "");
        const password = String(formData.get("password") ?? "");
        if (username === expected.username && password === expected.password) {
          document.title = "Credential Fixture Authenticated";
          document.body.dataset.authenticatedUser = username;
          status.textContent = `Authenticated as ${username}`;
          location.hash = "#authenticated";
          return;
        }
        document.title = "Credential Fixture Rejected";
        document.body.dataset.authenticatedUser = "";
        status.textContent = "Authentication failed";
      });
    </script>
  </body>
</html>
