      enum:
        - proxy
        - tls_interceptor
        - secure_web_gateway
        - custom
    ReportSessionEgressUsageRequest:
      type: object
      description: Sanitized session egress usage counter delta. Do not include URLs, headers, credentials, response status, timing, payload bytes, or decrypted traffic contents.
      properties:
        rx_bytes_delta:
          type: integer
          format: int64
          minimum: 0
          default: 0
          description: Sanitized received byte delta observed for this session.
        tx_bytes_delta:
          type: integer
          format: int64
          minimum: 0
          default: 0
          description: Sanitized transmitted byte delta observed for this session.
        source_kind:
          allOf:
            - $ref: '#/components/schemas/SessionEgressUsageSourceKind'
          default: proxy
        observer_id:
          type: string
          maxLength: 128
          nullable: true
          pattern: '^[A-Za-z0-9._:-]+$'
          description: Sanitized observer identifier, such as a proxy instance id or local observer name.
        observed_at:
          type: string
          format: date-time
          nullable: true
          description: Observer timestamp. Defaults to the gateway receipt time when omitted.
