  /api/v1/sessions/{session_id}/recordings/{recording_id}/fail:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Mark a recording resource as failed
      operationId: failSessionRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FailSessionRecordingRequest'
      responses:
        '200':
          description: Recording metadata after failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/content:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    get:
      tags: [Session Recordings]
      summary: Download recording artifact content when available
      operationId: getSessionRecordingContent
      responses:
        '200':
          description: Recording artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Summarize session-level playback built from retained recording segments
      operationId: getSessionRecordingPlayback
      responses:
        '200':
          description: Session playback resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/manifest:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Materialize a session playback manifest over included recording segments
      operationId: getSessionRecordingPlaybackManifest
      responses:
        '200':
          description: Session playback manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackManifest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/export:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Download a packaged playback bundle containing manifest, player, and included segments
      operationId: getSessionRecordingPlaybackExport
      responses:
        '200':
          description: Zipped session playback bundle
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/recording/operations:
    get:
      tags: [Session Recordings]
      summary: Read gateway-local recording operation counters and timestamps
      operationId: getRecordingOperations
      responses:
        '200':
          description: Recording operation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingObservabilitySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/access-tokens:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Runtime]
      summary: Mint a short-lived connect ticket for one session
      operationId: issueSessionAccessToken
      responses:
        '200':
          description: Session-scoped connect ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAccessTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/automation-access:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Mint short-lived automation access for one session runtime
      operationId: issueSessionAutomationAccess
      responses:
        '200':
          description: Session-scoped automation access issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAutomationAccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/status:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Runtime]
      summary: Get a session lifecycle, runtime, and presence snapshot
      operationId: getSessionStatus
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Session lifecycle and presence snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/egress-diagnostics:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Runtime]
      summary: Get sanitized effective egress diagnostics for a session
      operationId: getSessionEgressDiagnostics
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Session effective egress diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressDiagnosticsResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Session Runtime]
      summary: Run an active browser egress diagnostics probe for a session
      description: Runs against an already-ready session runtime and persists sanitized evidence or a sanitized failure reason. The probe does not implicitly start stopped sessions.
      operationId: runSessionEgressDiagnosticsProbe
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunEgressDiagnosticsProbeRequest'
      responses:
        '200':
          description: Updated session effective egress diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressDiagnosticsResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/egress-usage:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Runtime]
      summary: Report sanitized session egress usage counters
      description: Accepts sanitized receive/transmit byte deltas and optional observer correlation metadata from an egress proxy, TLS interceptor, secure web gateway, or custom observer. BrowserPane stores only counters and sanitized correlation fields; URL, header, credential, status, timing, payload, and decrypted traffic logs remain owned by the configured observer.
      operationId: reportSessionEgressUsage
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSessionEgressUsageRequest'
      responses:
        '200':
          description: Updated sanitized session egress usage counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEgressUsageResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/connections/{connection_id}/disconnect:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - name: connection_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    post:
      tags: [Sessions]
      summary: Disconnect a single live session attachment
      operationId: disconnectSessionConnection
      responses:
        '200':
          description: Live session attachment disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/connections/disconnect-all:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      summary: Disconnect all live session attachments
      operationId: disconnectAllSessionConnections
      responses:
        '200':
          description: All live session attachments disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/stop:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      summary: Safely stop a session resource
      operationId: stopSession
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session cannot be stopped while blockers remain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStopConflictResponse'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      summary: Cancel a queued session resource before it is admitted
      operationId: cancelQueuedSession
      responses:
        '200':
          description: Queued session cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session is not queued and cannot be cancelled through the queue operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/release:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      summary: Release the live runtime while preserving the session resource and profile
      operationId: releaseSessionRuntime
      responses:
        '200':
          description: Session runtime released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session runtime cannot be released while blockers remain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStopConflictResponse'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/kill:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Sessions]
      summary: Force kill a session resource and terminate live attachments
      operationId: killSession
      responses:
        '200':
          description: Session force killed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/automation-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Delegate a session to an automation principal
      operationId: setAutomationOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAutomationDelegateRequest'
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Clear automation delegation from a session
      operationId: clearAutomationOwner
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/mcp-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Claim MCP ownership for a runtime-compatible session
      operationId: setSessionMcpOwner
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpOwnerRequest'
      responses:
        '200':
          description: MCP ownership claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Release MCP ownership for a runtime-compatible session
      operationId: clearSessionMcpOwner
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: MCP ownership released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    sessionAutomationAccessToken:
      type: apiKey
      in: header
      name: x-bpane-automation-access-token
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionTemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServicePrincipalId:
      name: service_principal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdentityMappingId:
      name: identity_mapping_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EgressProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BrowserContextId:
      name: context_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecordingId:
      name: recording_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkflowId:
      name: workflow_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkflowVersion:
      name: version
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionId:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunWorkspaceInputId:
      name: input_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialBindingId:
      name: binding_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExtensionId:
      name: extension_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionFileBindingId:
      name: binding_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionFileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BPaneFileName:
      name: x-bpane-file-name
      in: header
      required: true
      schema:
        type: string
    BPaneFileProvenance:
      name: x-bpane-file-provenance
      in: header
      required: false
      schema:
        type: string
      description: JSON-encoded provenance object associated with the uploaded file
    BPaneWorkflowWorkspaceId:
      name: x-bpane-workflow-workspace-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Allowed file workspace that should receive the uploaded workflow artifact
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Session not visible to the caller or does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Runtime or lifecycle conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Gone:
      description: Artifact was previously available but has expired or been removed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BackendUnavailable:
      description: Temporary backend or runtime failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SessionLifecycleState:
      type: string
      enum:
        - pending
        - starting
        - queued
        - ready
        - active
        - idle
        - released
        - stopping
        - stopped
        - failed
        - expired
    SessionOwnerMode:
      type: string
      enum:
        - collaborative
        - exclusive_browser_owner
    SessionViewport:
      type: object
      required: [width, height]
      properties:
        width:
          type: integer
          minimum: 1
          maximum: 65535
        height:
          type: integer
          minimum: 1
          maximum: 65535
    SessionOwner:
      type: object
      required: [subject, issuer, display_name]
      properties:
        subject:
          type: string
        issuer:
          type: string
        display_name:
          type: string
          nullable: true
    SessionAutomationDelegate:
      type: object
      required: [client_id, issuer, display_name]
      properties:
        client_id:
          type: string
        issuer:
          type: string
        display_name:
          type: string
          nullable: true
    SessionCapabilities:
      type: object
      required:
        - browser_input
        - clipboard
        - audio
        - microphone
        - camera
        - file_transfer
        - resize
      properties:
        browser_input:
          type: boolean
        clipboard:
          type: boolean
        audio:
          type: boolean
        microphone:
          type: boolean
        camera:
          type: boolean
        file_transfer:
          type: boolean
        resize:
          type: boolean
    SessionRecordingMode:
      type: string
      enum:
        - disabled
        - manual
        - always
    SessionRecordingFormat:
      type: string
      enum: [webm]
    SessionRecordingPolicy:
      type: object
      required:
        - mode
        - format
        - retention_sec
      properties:
        mode:
          $ref: '#/components/schemas/SessionRecordingMode'
        format:
          $ref: '#/components/schemas/SessionRecordingFormat'
        retention_sec:
          type: integer
          nullable: true
          minimum: 1
    AutomationTaskState:
      type: string
      enum:
        - pending
        - queued
        - starting
        - running
        - awaiting_input
        - succeeded
        - failed
        - cancelled
        - timed_out
    AutomationTaskSessionSource:
      type: string
      enum:
        - existing_session
        - created_session
    AutomationTaskLogStream:
      type: string
      enum:
        - stdout
        - stderr
        - system
    AutomationTaskSessionBinding:
      type: object
      required: [source, session_id]
      properties:
        source:
          $ref: '#/components/schemas/AutomationTaskSessionSource'
        session_id:
          type: string
          format: uuid
    CreateAutomationTaskSessionRequest:
      type: object
      properties:
        existing_session_id:
          type: string
          format: uuid
          nullable: true
        create_session:
          allOf:
            - $ref: '#/components/schemas/CreateSessionRequest'
          nullable: true
    CreateAutomationTaskRequest:
      type: object
      additionalProperties: false
      required: [executor, session]
      properties:
        display_name:
          type: string
          nullable: true
        executor:
          type: string
        session:
          $ref: '#/components/schemas/CreateAutomationTaskSessionRequest'
        input:
          nullable: true
        labels:
          type: object
          additionalProperties:
            type: string
    TransitionAutomationTaskRequest:
      type: object
      additionalProperties: false
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/AutomationTaskState'
        output:
          nullable: true
        error:
          type: string
          nullable: true
        artifact_refs:
          type: array
          items:
            type: string
        message:
          type: string
          nullable: true
        data:
          nullable: true
    AppendAutomationTaskLogRequest:
      type: object
      additionalProperties: false
      required: [stream, message]
      properties:
        stream:
          $ref: '#/components/schemas/AutomationTaskLogStream'
        message:
          type: string
    AutomationTaskResource:
      type: object
      required:
        - id
        - display_name
        - executor
        - state
        - session
        - input
        - output
        - error
        - artifact_refs
        - labels
        - cancel_requested_at
        - started_at
        - completed_at
        - logs_path
        - events_path
        - created_at
