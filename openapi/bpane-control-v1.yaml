          minimum: 1
          nullable: true
          description: Budget for aggregated finalized plus live browser runtime milliseconds. Crossing this budget emits usage alerts; with usage_budget_enforcement=block_session_creation, new project sessions are rejected once the budget is exhausted.
        max_egress_total_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
          description: Soft metadata budget for sanitized egress byte counters. Crossing this budget emits usage alerts but does not reject requests.
    ProjectPolicy:
      type: object
      additionalProperties: false
      properties:
        allowed_session_template_ids:
          type: array
          description: Empty or omitted means templates are unrestricted for this project.
          items:
            type: string
        allowed_egress_profile_ids:
          type: array
          description: Empty or omitted means egress profiles are unrestricted for this project.
          items:
            type: string
            format: uuid
        allowed_extension_ids:
          type: array
          description: Empty or omitted means session extension definitions are unrestricted for this project.
          items:
            type: string
            format: uuid
        allowed_browser_context_ids:
          type: array
          description: Empty or omitted means reusable browser contexts are unrestricted for this project. Fresh and ephemeral session contexts remain allowed when this list is configured.
          items:
            type: string
            format: uuid
        allowed_file_workspace_ids:
          type: array
          description: Empty or omitted means file workspaces are unrestricted for this project. When configured, project workflow runs and session-file bindings may only consume listed workspace ids.
          items:
            type: string
            format: uuid
        allow_browser_uploads:
          type: boolean
          default: true
          description: When false, project sessions reject browser upload transfers and clear the live file-transfer capability.
        allow_browser_downloads:
          type: boolean
          default: true
          description: When false, project sessions reject browser download transfers and clear the live file-transfer capability.
        allow_session_file_bindings:
          type: boolean
          default: true
          description: When false, owners cannot attach workspace files as session-file bindings for project sessions.
        allow_manual_recordings:
          type: boolean
          default: true
          description: When false, owners cannot start ad-hoc/manual recordings for project sessions. Always-on recording policy remains an explicit session setting.
        usage_budget_enforcement:
          $ref: '#/components/schemas/ProjectUsageBudgetEnforcement'
    ProjectUsageBudgetEnforcement:
      type: string
      description: Warning-only keeps project usage budgets advisory. Block-session-creation rejects new project sessions after the project reaches max_session_creations, exhausts max_session_creations_per_window in the configured window, or reaches max_runtime_usage_ms; egress budgets remain advisory.
      enum:
        - warning_only
        - block_session_creation
    ProjectUsageResource:
      type: object
      required:
        - project_id
        - active_sessions
        - queued_sessions
        - session_creations
        - max_session_creations
        - max_active_sessions
        - active_workflow_runs
        - max_active_workflow_runs
        - runtime_usage_ms
        - max_runtime_usage_ms
        - egress_rx_bytes
        - egress_tx_bytes
        - egress_total_bytes
        - max_egress_total_bytes
        - retained_storage_bytes
        - max_retained_storage_bytes
        - alerts
        - observed_at
      properties:
        project_id:
          type: string
          format: uuid
        active_sessions:
          type: integer
          minimum: 0
        queued_sessions:
          type: integer
          minimum: 0
        session_creations:
          type: integer
          minimum: 0
        max_session_creations:
          type: integer
          minimum: 1
          nullable: true
        max_active_sessions:
          type: integer
          minimum: 1
          nullable: true
        active_workflow_runs:
          type: integer
          minimum: 0
        max_active_workflow_runs:
          type: integer
          minimum: 1
          nullable: true
        runtime_usage_ms:
          type: integer
          format: int64
          minimum: 0
          description: Aggregated browser runtime duration for sessions in this project. Live sessions include elapsed runtime through observed_at.
        max_runtime_usage_ms:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        egress_rx_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Sanitized receive byte counter reported by egress observers for sessions in this project.
        egress_tx_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Sanitized transmit byte counter reported by egress observers for sessions in this project.
        egress_total_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Sum of egress_rx_bytes and egress_tx_bytes.
        max_egress_total_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        retained_storage_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Retained bytes currently counted from project-linked workflow produced files, completed recording artifacts, session files, and project-owned file workspace files.
        max_retained_storage_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
          description: Configured retained-storage quota for the currently counted project artifact classes. Null means unbounded.
        alerts:
          type: array
          description: Warning-first usage budget signals derived from configured soft budgets. Alerts do not imply request rejection.
          items:
            $ref: '#/components/schemas/ProjectUsageAlertResource'
        observed_at:
          type: string
          format: date-time
