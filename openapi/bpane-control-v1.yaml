openapi: 3.0.3
info:
  title: BrowserPane Session Control API
  version: 1.0.0
  description: >
    Frozen v1 session-control contract for BrowserPane. This document covers the
    canonical owner-scoped `/api/v1/sessions` surface. Legacy global compatibility
    routes such as `/api/session/status` and `/api/session/mcp-owner` are intentionally
    excluded from this freeze and remain transitional.
servers:
  - url: http://localhost:8932
    description: Direct local gateway HTTP API
  - url: http://localhost:8080
    description: Same-origin local web proxy
tags:
  - name: Sessions
  - name: Session Runtime
  - name: Session Recordings
  - name: Session Automation
security:
  - bearerAuth: []
paths:
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List sessions visible to the authenticated owner or delegated automation principal
      operationId: listSessions
      responses:
        '200':
          description: Owner-scoped session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Sessions]
      summary: Create a new persistent session resource
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      summary: Fetch one visible session resource
      operationId: getSession
      responses:
        '200':
          description: Session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Sessions]
      summary: Stop a session resource
      operationId: deleteSession
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: List recordings associated with a visible session
      operationId: listSessionRecordings
      responses:
        '200':
          description: Session recording metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Session Recordings]
      summary: Create a new recording resource for a runtime-compatible session
      operationId: createSessionRecording
      responses:
        '201':
          description: Recording metadata created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    get:
      tags: [Session Recordings]
      summary: Fetch one recording resource for a visible session
      operationId: getSessionRecording
      responses:
        '200':
          description: Recording metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/stop:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Transition an active recording toward finalization
      operationId: stopSessionRecording
      responses:
        '200':
          description: Recording metadata after stop request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/complete:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Finalize recording metadata with artifact details
      operationId: completeSessionRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteSessionRecordingRequest'
      responses:
        '200':
          description: Recording metadata after artifact finalization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/fail:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Mark a recording resource as failed
      operationId: failSessionRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FailSessionRecordingRequest'
      responses:
        '200':
          description: Recording metadata after failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/content:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    get:
      tags: [Session Recordings]
      summary: Download recording artifact content when available
      operationId: getSessionRecordingContent
      responses:
        '200':
          description: Recording artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Summarize session-level playback built from retained recording segments
      operationId: getSessionRecordingPlayback
      responses:
        '200':
          description: Session playback resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/manifest:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Materialize a session playback manifest over included recording segments
      operationId: getSessionRecordingPlaybackManifest
      responses:
        '200':
          description: Session playback manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackManifest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/export:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Download a packaged playback bundle containing manifest, player, and included segments
      operationId: getSessionRecordingPlaybackExport
      responses:
        '200':
          description: Zipped session playback bundle
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/recording/operations:
    get:
      tags: [Session Recordings]
      summary: Read gateway-local recording operation counters and timestamps
      operationId: getRecordingOperations
      responses:
        '200':
          description: Recording operation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingObservabilitySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/access-tokens:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Runtime]
      summary: Mint a short-lived connect ticket for one session
      operationId: issueSessionAccessToken
      responses:
        '200':
          description: Session-scoped connect ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAccessTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/status:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Runtime]
      summary: Get live runtime telemetry for a runtime-compatible session
      operationId: getSessionStatus
      responses:
        '200':
          description: Live runtime telemetry snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/automation-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Delegate a session to an automation principal
      operationId: setAutomationOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAutomationDelegateRequest'
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Clear automation delegation from a session
      operationId: clearAutomationOwner
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/mcp-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Claim MCP ownership for a runtime-compatible session
      operationId: setSessionMcpOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpOwnerRequest'
      responses:
        '200':
          description: MCP ownership claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Release MCP ownership for a runtime-compatible session
      operationId: clearSessionMcpOwner
      responses:
        '200':
          description: MCP ownership released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecordingId:
      name: recording_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Session not visible to the caller or does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Runtime or lifecycle conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Gone:
      description: Artifact was previously available but has expired or been removed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BackendUnavailable:
      description: Temporary backend or runtime failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SessionLifecycleState:
      type: string
      enum:
        - pending
        - starting
        - ready
        - active
        - idle
        - stopping
        - stopped
        - failed
        - expired
    SessionOwnerMode:
      type: string
      enum:
        - collaborative
        - exclusive_browser_owner
    SessionViewport:
      type: object
      required: [width, height]
      properties:
        width:
          type: integer
          minimum: 1
          maximum: 65535
        height:
          type: integer
          minimum: 1
          maximum: 65535
    SessionOwner:
      type: object
      required: [subject, issuer, display_name]
      properties:
        subject:
          type: string
        issuer:
          type: string
        display_name:
          type: string
          nullable: true
    SessionAutomationDelegate:
      type: object
      required: [client_id, issuer, display_name]
      properties:
        client_id:
          type: string
        issuer:
          type: string
        display_name:
          type: string
          nullable: true
    SessionCapabilities:
      type: object
      required:
        - browser_input
        - clipboard
        - audio
        - microphone
        - camera
        - file_transfer
        - resize
      properties:
        browser_input:
          type: boolean
        clipboard:
          type: boolean
        audio:
          type: boolean
        microphone:
          type: boolean
        camera:
          type: boolean
        file_transfer:
          type: boolean
        resize:
          type: boolean
    SessionRecordingMode:
      type: string
      enum:
        - disabled
        - manual
        - always
    SessionRecordingFormat:
      type: string
      enum: [webm]
    SessionRecordingPolicy:
      type: object
      required:
        - mode
        - format
        - retention_sec
      properties:
        mode:
          $ref: '#/components/schemas/SessionRecordingMode'
        format:
          $ref: '#/components/schemas/SessionRecordingFormat'
        retention_sec:
          type: integer
          nullable: true
          minimum: 1
    SessionConnectInfo:
      type: object
      required:
        - gateway_url
        - transport_path
        - auth_type
        - ticket_path
        - compatibility_mode
      properties:
        gateway_url:
          type: string
          format: uri
        transport_path:
          type: string
        auth_type:
          type: string
          enum: [session_connect_ticket]
        ticket_path:
          type: string
          nullable: true
        compatibility_mode:
          type: string
          enum:
            - legacy_single_runtime
            - session_runtime_pool
    SessionRuntimeInfo:
      type: object
      required: [binding, compatibility_mode, cdp_endpoint]
      properties:
        binding:
          type: string
          enum:
            - legacy_single_session
            - docker_runtime_pool
        compatibility_mode:
          type: string
          enum:
            - legacy_single_runtime
            - session_runtime_pool
        cdp_endpoint:
          type: string
          nullable: true
          format: uri
    SessionResource:
      type: object
      required:
        - id
        - state
        - template_id
        - owner_mode
        - viewport
        - capabilities
        - owner
        - automation_delegate
        - idle_timeout_sec
        - labels
        - integration_context
        - recording
        - connect
        - runtime
        - created_at
        - updated_at
        - stopped_at
      properties:
        id:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/SessionLifecycleState'
        template_id:
          type: string
          nullable: true
        owner_mode:
          $ref: '#/components/schemas/SessionOwnerMode'
        viewport:
          $ref: '#/components/schemas/SessionViewport'
        capabilities:
          $ref: '#/components/schemas/SessionCapabilities'
        owner:
          $ref: '#/components/schemas/SessionOwner'
        automation_delegate:
          allOf:
            - $ref: '#/components/schemas/SessionAutomationDelegate'
          nullable: true
        idle_timeout_sec:
          type: integer
          nullable: true
          minimum: 1
        labels:
          type: object
          additionalProperties:
            type: string
        integration_context:
          type: object
          nullable: true
          additionalProperties: true
        recording:
          $ref: '#/components/schemas/SessionRecordingPolicy'
        connect:
          $ref: '#/components/schemas/SessionConnectInfo'
        runtime:
          $ref: '#/components/schemas/SessionRuntimeInfo'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stopped_at:
          type: string
          format: date-time
          nullable: true
    CreateSessionRequest:
      type: object
      additionalProperties: false
      properties:
        template_id:
          type: string
          nullable: true
        owner_mode:
          $ref: '#/components/schemas/SessionOwnerMode'
        viewport:
          $ref: '#/components/schemas/SessionViewport'
        idle_timeout_sec:
          type: integer
          minimum: 1
          nullable: true
        labels:
          type: object
          additionalProperties:
            type: string
        integration_context:
          type: object
          nullable: true
          additionalProperties: true
        recording:
          $ref: '#/components/schemas/SessionRecordingPolicy'
    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionResource'
    SessionRecordingResourceState:
      type: string
      enum:
        - starting
        - recording
        - finalizing
        - ready
        - failed
    SessionRecordingTerminationReason:
      type: string
      enum:
        - manual_stop
        - session_stop
        - idle_stop
        - gateway_restart
        - worker_exit
    SessionRecordingResource:
      type: object
      required:
        - id
        - session_id
        - previous_recording_id
        - state
        - format
        - mime_type
        - bytes
        - duration_ms
        - error
        - termination_reason
        - artifact_available
        - content_path
        - started_at
        - completed_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        previous_recording_id:
          type: string
          format: uuid
          nullable: true
        state:
          $ref: '#/components/schemas/SessionRecordingResourceState'
        format:
          $ref: '#/components/schemas/SessionRecordingFormat'
        mime_type:
          type: string
          nullable: true
        bytes:
          type: integer
          nullable: true
          minimum: 0
        duration_ms:
          type: integer
          nullable: true
          minimum: 0
        error:
          type: string
          nullable: true
        termination_reason:
          allOf:
            - $ref: '#/components/schemas/SessionRecordingTerminationReason'
          nullable: true
        artifact_available:
          type: boolean
        content_path:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SessionRecordingListResponse:
      type: object
      required: [recordings]
      properties:
        recordings:
          type: array
          items:
            $ref: '#/components/schemas/SessionRecordingResource'
    SessionRecordingPlaybackState:
      type: string
      enum:
        - empty
        - ready
        - partial
    SessionRecordingPlaybackResource:
      type: object
      required:
        - session_id
        - state
        - segment_count
        - included_segment_count
        - failed_segment_count
        - active_segment_count
        - missing_artifact_segment_count
        - included_bytes
        - included_duration_ms
        - manifest_path
        - export_path
        - generated_at
      properties:
        session_id:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/SessionRecordingPlaybackState'
        segment_count:
          type: integer
          minimum: 0
        included_segment_count:
          type: integer
          minimum: 0
        failed_segment_count:
          type: integer
          minimum: 0
        active_segment_count:
          type: integer
          minimum: 0
        missing_artifact_segment_count:
          type: integer
          minimum: 0
        included_bytes:
          type: integer
          minimum: 0
        included_duration_ms:
          type: integer
          minimum: 0
        manifest_path:
          type: string
        export_path:
          type: string
        generated_at:
          type: string
          format: date-time
    SessionRecordingPlaybackSegment:
      type: object
      required:
        - sequence
        - recording_id
        - previous_recording_id
        - file_name
        - content_path
        - mime_type
        - bytes
        - duration_ms
        - termination_reason
        - started_at
        - completed_at
      properties:
        sequence:
          type: integer
          minimum: 1
        recording_id:
          type: string
          format: uuid
        previous_recording_id:
          type: string
