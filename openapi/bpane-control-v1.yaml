openapi: 3.0.3
info:
  title: BrowserPane Session Control API
  version: 1.0.0
  description: >
    Frozen v1 session-control contract for BrowserPane. This document covers the
    canonical owner-scoped `/api/v1/sessions` surface. Legacy global compatibility
    routes such as `/api/session/status` and `/api/session/mcp-owner` are intentionally
    excluded from this freeze and remain transitional.
servers:
  - url: http://localhost:8932
    description: Direct local gateway HTTP API
  - url: http://localhost:8080
    description: Same-origin local web proxy
tags:
  - name: Sessions
  - name: Session Runtime
  - name: Session Recordings
  - name: Session Automation
  - name: Automation Tasks
  - name: Workflows
security:
  - bearerAuth: []
paths:
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List sessions visible to the authenticated owner or delegated automation principal
      operationId: listSessions
      responses:
        '200':
          description: Owner-scoped session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Sessions]
      summary: Create a new persistent session resource
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks:
    get:
      tags: [Automation Tasks]
      summary: List automation tasks visible to the authenticated owner
      operationId: listAutomationTasks
      responses:
        '200':
          description: Automation task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Automation Tasks]
      summary: Create a new automation task
      operationId: createAutomationTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutomationTaskRequest'
      responses:
        '201':
          description: Automation task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: Fetch one automation task
      operationId: getAutomationTask
      responses:
        '200':
          description: Automation task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Automation Tasks]
      summary: Cancel an automation task that is not yet terminal
      operationId: cancelAutomationTask
      responses:
        '200':
          description: Updated automation task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/events:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: List persisted events for one automation task
      operationId: getAutomationTaskEvents
      responses:
        '200':
          description: Automation task event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/logs:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: List persisted log lines for one automation task
      operationId: getAutomationTaskLogs
      responses:
        '200':
          description: Automation task log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows:
    get:
      tags: [Workflows]
      summary: List workflow definitions visible to the authenticated owner
      operationId: listWorkflowDefinitions
      responses:
        '200':
          description: Workflow definition list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Workflows]
      summary: Create a workflow definition
      operationId: createWorkflowDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowDefinitionRequest'
      responses:
        '201':
          description: Workflow definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
    get:
      tags: [Workflows]
      summary: Fetch one workflow definition
      operationId: getWorkflowDefinition
      responses:
        '200':
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}/versions:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
    post:
      tags: [Workflows]
      summary: Create an immutable workflow definition version
      operationId: createWorkflowDefinitionVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowDefinitionVersionRequest'
      responses:
        '201':
          description: Workflow definition version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionVersionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/WorkflowVersion'
    get:
      tags: [Workflows]
      summary: Fetch one workflow definition version
      operationId: getWorkflowDefinitionVersion
      responses:
        '200':
          description: Workflow definition version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionVersionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs:
    post:
      tags: [Workflows]
      summary: Invoke a workflow definition version
      operationId: createWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRunRequest'
      responses:
        '201':
          description: Workflow run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: Fetch one workflow run
      operationId: getWorkflowRun
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Cancel a workflow run by cancelling its active automation task
      operationId: cancelWorkflowRun
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/events:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: List workflow run events, including child automation task events
      operationId: getWorkflowRunEvents
      responses:
        '200':
          description: Workflow run event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/logs:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: List workflow run logs, including child automation task logs
      operationId: getWorkflowRunLogs
      responses:
        '200':
          description: Workflow run log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Sessions]
      summary: Fetch one visible session resource
      operationId: getSession
      responses:
        '200':
          description: Session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Sessions]
      summary: Stop a session resource
      operationId: deleteSession
      responses:
        '200':
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: List recordings associated with a visible session
      operationId: listSessionRecordings
      responses:
        '200':
          description: Session recording metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Session Recordings]
      summary: Create a new recording resource for a runtime-compatible session
      operationId: createSessionRecording
      responses:
        '201':
          description: Recording metadata created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    get:
      tags: [Session Recordings]
      summary: Fetch one recording resource for a visible session
      operationId: getSessionRecording
      responses:
        '200':
          description: Recording metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/stop:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Transition an active recording toward finalization
      operationId: stopSessionRecording
      responses:
        '200':
          description: Recording metadata after stop request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/complete:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Finalize recording metadata with artifact details
      operationId: completeSessionRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteSessionRecordingRequest'
      responses:
        '200':
          description: Recording metadata after artifact finalization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/fail:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    post:
      tags: [Session Recordings]
      summary: Mark a recording resource as failed
      operationId: failSessionRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FailSessionRecordingRequest'
      responses:
        '200':
          description: Recording metadata after failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recordings/{recording_id}/content:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/RecordingId'
    get:
      tags: [Session Recordings]
      summary: Download recording artifact content when available
      operationId: getSessionRecordingContent
      responses:
        '200':
          description: Recording artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Summarize session-level playback built from retained recording segments
      operationId: getSessionRecordingPlayback
      responses:
        '200':
          description: Session playback resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/manifest:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Materialize a session playback manifest over included recording segments
      operationId: getSessionRecordingPlaybackManifest
      responses:
        '200':
          description: Session playback manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRecordingPlaybackManifest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/recording-playback/export:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Recordings]
      summary: Download a packaged playback bundle containing manifest, player, and included segments
      operationId: getSessionRecordingPlaybackExport
      responses:
        '200':
          description: Zipped session playback bundle
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/recording/operations:
    get:
      tags: [Session Recordings]
      summary: Read gateway-local recording operation counters and timestamps
      operationId: getRecordingOperations
      responses:
        '200':
          description: Recording operation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingObservabilitySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/access-tokens:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Runtime]
      summary: Mint a short-lived connect ticket for one session
      operationId: issueSessionAccessToken
      responses:
        '200':
          description: Session-scoped connect ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAccessTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/automation-access:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Mint short-lived automation access for one session runtime
      operationId: issueSessionAutomationAccess
      responses:
        '200':
          description: Session-scoped automation access issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAutomationAccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/status:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    get:
      tags: [Session Runtime]
      summary: Get live runtime telemetry for a runtime-compatible session
      operationId: getSessionStatus
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Live runtime telemetry snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/automation-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Delegate a session to an automation principal
      operationId: setAutomationOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAutomationDelegateRequest'
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Clear automation delegation from a session
      operationId: clearAutomationOwner
      responses:
        '200':
          description: Updated session resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions/{session_id}/mcp-owner:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    post:
      tags: [Session Automation]
      summary: Claim MCP ownership for a runtime-compatible session
      operationId: setSessionMcpOwner
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpOwnerRequest'
      responses:
        '200':
          description: MCP ownership claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Session Automation]
      summary: Release MCP ownership for a runtime-compatible session
      operationId: clearSessionMcpOwner
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: MCP ownership released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
