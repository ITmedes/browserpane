openapi: 3.0.3
info:
  title: BrowserPane Session Control API
  version: 1.0.0
  description: >
    Frozen v1 session-control contract for BrowserPane. This document covers the
    canonical owner-scoped `/api/v1/sessions` surface. Legacy global compatibility
    routes such as `/api/session/status` and `/api/session/mcp-owner` are intentionally
    excluded from this freeze and remain transitional.
servers:
  - url: http://localhost:8932
    description: Direct local gateway HTTP API
  - url: http://localhost:8080
    description: Same-origin local web proxy
tags:
  - name: Sessions
  - name: Session Runtime
  - name: Session Recordings
  - name: Session Files
  - name: Session Automation
  - name: Automation Tasks
  - name: Credential Bindings
  - name: Extensions
  - name: File Workspaces
  - name: Workflows
security:
  - bearerAuth: []
paths:
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List sessions visible to the authenticated owner or delegated automation principal
      operationId: listSessions
      responses:
        '200':
          description: Owner-scoped session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Sessions]
      summary: Create a new persistent session resource
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks:
    get:
      tags: [Automation Tasks]
      summary: List automation tasks visible to the authenticated owner
      operationId: listAutomationTasks
      responses:
        '200':
          description: Automation task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Automation Tasks]
      summary: Create a new automation task
      operationId: createAutomationTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAutomationTaskRequest'
      responses:
        '201':
          description: Automation task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: Fetch one automation task
      operationId: getAutomationTask
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Automation task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/state:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Automation Tasks]
      summary: Transition an automation task through executor-owned state updates
      operationId: transitionAutomationTaskState
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionAutomationTaskRequest'
      responses:
        '200':
          description: Updated automation task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Automation Tasks]
      summary: Cancel an automation task that is not yet terminal
      operationId: cancelAutomationTask
      responses:
        '200':
          description: Updated automation task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/events:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: List persisted events for one automation task
      operationId: getAutomationTaskEvents
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Automation task event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/automation-tasks/{task_id}/logs:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Automation Tasks]
      summary: List persisted log lines for one automation task
      operationId: getAutomationTaskLogs
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Automation task log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Automation Tasks]
      summary: Append a persisted log line for one automation task
      operationId: appendAutomationTaskLog
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendAutomationTaskLogRequest'
      responses:
        '200':
          description: Persisted automation task log line
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTaskLogResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows:
    get:
      tags: [Workflows]
      summary: List workflow definitions visible to the authenticated owner
      operationId: listWorkflowDefinitions
      responses:
        '200':
          description: Workflow definition list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Workflows]
      summary: Create a workflow definition
      operationId: createWorkflowDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowDefinitionRequest'
      responses:
        '201':
          description: Workflow definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
    get:
      tags: [Workflows]
      summary: Fetch one workflow definition
      operationId: getWorkflowDefinition
      responses:
        '200':
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}/versions:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
    post:
      tags: [Workflows]
      summary: Create an immutable workflow definition version
      operationId: createWorkflowDefinitionVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowDefinitionVersionRequest'
      responses:
        '201':
          description: Workflow definition version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionVersionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflows/{workflow_id}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/WorkflowVersion'
    get:
      tags: [Workflows]
      summary: Fetch one workflow definition version
      operationId: getWorkflowDefinitionVersion
      responses:
        '200':
          description: Workflow definition version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinitionVersionResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs:
    post:
      tags: [Workflows]
      summary: Invoke a workflow definition version
      operationId: createWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRunRequest'
      responses:
        '200':
          description: Existing workflow run returned for an idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '201':
          description: Workflow run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: Fetch one workflow run
      operationId: getWorkflowRun
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/source-snapshot/content:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: Download the immutable source snapshot archive for a workflow run
      operationId: getWorkflowRunSourceSnapshotContent
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run source snapshot archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/credential-bindings/{binding_id}/resolved:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/CredentialBindingId'
    get:
      tags: [Workflows]
      summary: Resolve one workflow run credential binding through session automation access
      operationId: getWorkflowRunCredentialBindingResolved
      security:
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run credential binding with resolved secret payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedWorkflowRunCredentialBindingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/workspace-inputs/{input_id}/content:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/RunWorkspaceInputId'
    get:
      tags: [Workflows]
      summary: Download one workflow run workspace input
      operationId: getWorkflowRunWorkspaceInputContent
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run workspace input content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/produced-files:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: List workflow-run produced files linked to a visible run
      operationId: listWorkflowRunProducedFiles
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run produced file list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunProducedFileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Workflows]
      summary: Upload a produced file and link it to a workflow run
      operationId: uploadWorkflowRunProducedFile
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      parameters:
        - $ref: '#/components/parameters/BPaneWorkflowWorkspaceId'
        - $ref: '#/components/parameters/BPaneFileName'
        - $ref: '#/components/parameters/BPaneFileProvenance'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Produced file metadata created and linked to the workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunProducedFileResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/produced-files/{file_id}/content:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/FileId'
    get:
      tags: [Workflows]
      summary: Download one workflow-run produced file
      operationId: getWorkflowRunProducedFileContent
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run produced file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/state:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Transition a workflow run through executor-owned state updates
      operationId: transitionWorkflowRunState
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionWorkflowRunRequest'
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Cancel a workflow run by cancelling its active automation task
      operationId: cancelWorkflowRun
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/submit-input:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Submit owner-provided input to a workflow run that is awaiting input
      operationId: submitWorkflowRunInput
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWorkflowRunInputRequest'
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/resume:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Resume a workflow run that is awaiting operator action without submitting new input
      operationId: resumeWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeWorkflowRunRequest'
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/reject:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [Workflows]
      summary: Reject a workflow run that is awaiting operator action and fail the run
      operationId: rejectWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectWorkflowRunRequest'
      responses:
        '200':
          description: Updated workflow run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/events:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: List workflow run events, including child automation task events
      operationId: getWorkflowRunEvents
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-runs/{run_id}/logs:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Workflows]
      summary: List workflow run logs, including child automation task logs
      operationId: getWorkflowRunLogs
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      responses:
        '200':
          description: Workflow run log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Workflows]
      summary: Append a persisted workflow-run log line
      operationId: appendWorkflowRunLog
      security:
        - bearerAuth: []
        - sessionAutomationAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendWorkflowRunLogRequest'
      responses:
        '200':
          description: Persisted workflow run log line
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunLogResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow/operations:
    get:
      tags: [Workflows]
      summary: Read gateway-local workflow delivery, artifact, and retention counters
      operationId: getWorkflowOperations
      responses:
        '200':
          description: Workflow operation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowObservabilitySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/workflow-event-subscriptions:
    get:
      tags: [Workflows]
