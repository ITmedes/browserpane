openapi: 3.0.3
info:
  title: BrowserPane Control Plane API
  version: 1.0.0
  description: >
    Frozen v1 owner-scoped BrowserPane control-plane contract. This document
    covers the canonical `/api/v1` surfaces for sessions, session templates,
    projects, browser contexts, egress profiles, automation tasks, recordings, workflows,
    reusable files, credentials, approved extensions, and admin realtime snapshots. Legacy global compatibility routes such as
    `/api/session/status` and `/api/session/mcp-owner` are intentionally excluded
    from this freeze and remain transitional.
servers:
  - url: http://localhost:8932
    description: Direct local gateway HTTP API
  - url: http://localhost:8080
    description: Same-origin local web proxy
tags:
  - name: Admin Events
  - name: Identity
  - name: Sessions
  - name: Session Templates
  - name: Projects
  - name: Egress Profiles
  - name: Browser Contexts
  - name: Session Runtime
  - name: Session Recordings
  - name: Session Files
  - name: Session Automation
  - name: Automation Tasks
  - name: Credential Bindings
  - name: Extensions
  - name: File Workspaces
  - name: Workflows
security:
  - bearerAuth: []
paths:
  /api/v1/admin/events:
    get:
      tags: [Admin Events]
      summary: Open the admin realtime snapshot WebSocket
      operationId: openAdminEvents
      description: >
        Upgrades to a WebSocket that emits owner-scoped JSON snapshot events for
        sessions, workflow runs, session files, recordings, and MCP delegation
        whenever the corresponding snapshot changes.
      parameters:
        - name: access_token
          in: query
          required: false
          schema:
            type: string
          description: Browser WebSocket fallback token. Prefer Authorization bearer headers where available.
      responses:
        '101':
          description: WebSocket upgraded; text messages contain admin snapshot events or admin.error payloads.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/identity/me:
    get:
      tags: [Identity]
      summary: Describe the authenticated owner principal
      operationId: getCurrentIdentity
      description: >
        Returns normalized metadata for the bearer principal currently calling
        the owner-scoped control plane. No secrets or raw token claims are
        returned.
      responses:
        '200':
          description: Authenticated principal metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityPrincipalResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/identity/access-review:
    get:
      tags: [Identity]
      summary: Export the authenticated owner's access-review summary
      operationId: getIdentityAccessReview
      description: >
        Returns a sanitized owner-scoped access review with the current
        principal, project usage, service-principal registry metadata, explicit
        identity-to-project mappings, safe group/claim mapping evaluation,
        unmapped-principal signals, resource counts, and delegated automation
        principals visible through the session catalog. Raw bearer token claims
        and credential material are not returned.
      responses:
        '200':
          description: Owner-scoped access review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityAccessReviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/service-principals:
    get:
      tags: [Identity]
      summary: List owner-scoped service principals
      operationId: listServicePrincipals
      description: >
        Returns registered external OIDC client metadata for the authenticated
        owner. Responses are sanitized and never include client secrets, raw
        token claims, or credential material.
      responses:
        '200':
          description: Owner-scoped service-principal registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePrincipalListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Identity]
      summary: Register an owner-scoped service principal
      operationId: createServicePrincipal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertServicePrincipalRequest'
      responses:
        '201':
          description: Service principal registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePrincipalResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/service-principals/{service_principal_id}:
    parameters:
      - $ref: '#/components/parameters/ServicePrincipalId'
    get:
      tags: [Identity]
      summary: Fetch one owner-scoped service principal
      operationId: getServicePrincipal
      responses:
        '200':
          description: Service-principal registry entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePrincipalResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    put:
      tags: [Identity]
      summary: Replace one owner-scoped service principal
      operationId: updateServicePrincipal
      description: >
        Replaces service-principal metadata including lifecycle state. Disabled
        registered principals cannot be assigned as new automation delegates,
        but existing session metadata remains visible for cleanup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertServicePrincipalRequest'
      responses:
        '200':
          description: Service principal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePrincipalResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/identity-mappings:
    get:
      tags: [Identity]
      summary: List owner-scoped identity-to-project mappings
      operationId: listIdentityMappings
      description: >
        Returns explicit mappings from external users, groups, claims, or
        registered service principals to BrowserPane projects. Responses are
        sanitized and never include raw token claims or credential material.
      responses:
        '200':
          description: Owner-scoped identity mapping registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityMappingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Identity]
      summary: Create an owner-scoped identity-to-project mapping
      operationId: createIdentityMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertIdentityMappingRequest'
      responses:
        '201':
          description: Identity mapping created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityMappingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/identity-mappings/{identity_mapping_id}:
    parameters:
      - $ref: '#/components/parameters/IdentityMappingId'
    get:
      tags: [Identity]
      summary: Fetch one owner-scoped identity mapping
      operationId: getIdentityMapping
      responses:
        '200':
          description: Identity mapping resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityMappingResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    put:
      tags: [Identity]
      summary: Replace one owner-scoped identity mapping
      operationId: updateIdentityMapping
      description: >
        Replaces identity mapping metadata including lifecycle state. Disabled
        mappings remain visible for review but are not treated as effective.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertIdentityMappingRequest'
      responses:
        '200':
          description: Identity mapping updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityMappingResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List sessions visible to the authenticated owner or delegated automation principal
      operationId: listSessions
      parameters:
        - name: template_id
          in: query
          required: false
          schema:
            type: string
          description: Return only sessions created with the given template id.
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated lifecycle states to include.
        - name: runtime_state
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated derived runtime states to include.
        - name: label.<key>
          in: query
          required: false
          schema:
            type: string
          description: Dynamic label equality filter, for example `label.team=support`.
        - name: integration.<key>
          in: query
          required: false
          schema:
            type: string
          description: Dynamic top-level integration-context string equality filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of returned sessions after filtering.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Number of matching sessions to skip after filtering.
      responses:
        '200':
          description: Owner-scoped session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Sessions]
      summary: Create a new persistent session resource
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/browser-contexts:
    get:
      tags: [Browser Contexts]
      summary: List owner-scoped browser contexts
      operationId: listBrowserContexts
      responses:
        '200':
          description: Owner-scoped browser context list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Browser Contexts]
      summary: Create an owner-scoped browser context catalog entry
      operationId: createBrowserContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrowserContextRequest'
      responses:
        '201':
          description: Browser context created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/browser-contexts/import:
    post:
      tags: [Browser Contexts]
      summary: Import a BrowserPane browser context export archive
      description: Creates a new reusable context from an export zip. The import never overwrites an existing context; target metadata is provided by headers and omitted metadata defaults to the archive manifest. Project scope is applied only when `x-bpane-browser-context-project-id` is provided.
      operationId: importBrowserContext
      parameters:
        - name: x-bpane-browser-context-name
          in: header
          required: true
          schema:
            type: string
        - name: x-bpane-browser-context-description
          in: header
          required: false
          schema:
            type: string
        - name: x-bpane-browser-context-project-id
          in: header
          required: false
          schema:
            type: string
            format: uuid
        - name: x-bpane-browser-context-labels
          in: header
          required: false
          description: JSON object whose values are strings.
          schema:
            type: string
        - name: x-bpane-browser-context-retention-sec
          in: header
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
        - name: x-bpane-browser-context-max-profile-storage-bytes
          in: header
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Imported browser context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/browser-contexts/{context_id}:
    parameters:
      - $ref: '#/components/parameters/BrowserContextId'
    get:
      tags: [Browser Contexts]
      summary: Fetch one owner-scoped browser context
      operationId: getBrowserContext
      responses:
        '200':
          description: Browser context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    delete:
      tags: [Browser Contexts]
      summary: Delete one owner-scoped browser context
      description: Refuses active runtime writers; docker-backed runtimes also remove the context-scoped Chromium profile volume when present.
      operationId: deleteBrowserContext
      responses:
        '200':
          description: Deleted browser context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/browser-contexts/{context_id}/clone:
    parameters:
      - $ref: '#/components/parameters/BrowserContextId'
    post:
      tags: [Browser Contexts]
      summary: Clone one owner-scoped reusable browser context
      description: Copies owner-local metadata and docker-backed Chromium profile data into a new reusable context; refuses deleted, ephemeral, missing, or active-writer source contexts.
      operationId: cloneBrowserContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneBrowserContextRequest'
      responses:
        '201':
          description: Cloned browser context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserContextResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/browser-contexts/{context_id}/export:
    parameters:
      - $ref: '#/components/parameters/BrowserContextId'
    get:
      tags: [Browser Contexts]
      summary: Export one owner-scoped reusable browser context
      description: Downloads a zip archive containing manifest.json and profile.tar.gz when docker-backed profile data is available; refuses deleted, ephemeral, missing, or active-writer source contexts.
      operationId: exportBrowserContext
      responses:
        '200':
          description: Browser context export archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/session-templates:
    get:
      tags: [Session Templates]
      summary: List owner-scoped session templates
      operationId: listSessionTemplates
      responses:
        '200':
          description: Owner-scoped session template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTemplateListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Session Templates]
      summary: Create an owner-scoped session template
      operationId: createSessionTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSessionTemplateRequest'
      responses:
        '201':
          description: Session template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTemplateResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/session-templates/{template_id}:
    parameters:
      - $ref: '#/components/parameters/SessionTemplateId'
    get:
      tags: [Session Templates]
      summary: Fetch one owner-scoped session template
      operationId: getSessionTemplate
      responses:
        '200':
          description: Session template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTemplateResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    put:
      tags: [Session Templates]
      summary: Replace one owner-scoped session template and increment its version
      operationId: updateSessionTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSessionTemplateRequest'
      responses:
        '200':
          description: Updated session template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTemplateResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List owner-scoped projects
      operationId: listProjects
      responses:
        '200':
          description: Owner-scoped project list with current usage counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Projects]
      summary: Create an owner-scoped project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/projects/{project_id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Fetch one owner-scoped project
      operationId: getProject
      responses:
        '200':
          description: Project with current usage counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    put:
      tags: [Projects]
      summary: Replace one owner-scoped project
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/projects/{project_id}/usage:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Fetch current sanitized usage counters for one project
      operationId: getProjectUsage
      responses:
        '200':
          description: Project usage counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectUsageResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/egress-profiles:
    get:
      tags: [Egress Profiles]
      summary: List owner-scoped egress profiles
      operationId: listEgressProfiles
      responses:
        '200':
          description: Owner-scoped egress profile list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressProfileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    post:
      tags: [Egress Profiles]
      summary: Create an owner-scoped egress profile
      operationId: createEgressProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEgressProfileRequest'
      responses:
        '201':
          description: Egress profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressProfileResource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
  /api/v1/egress-profiles/{profile_id}:
    parameters:
      - $ref: '#/components/parameters/EgressProfileId'
    get:
      tags: [Egress Profiles]
      summary: Fetch one owner-scoped egress profile
      operationId: getEgressProfile
      responses:
        '200':
          description: Egress profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressProfileResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/BackendUnavailable'
    put:
      tags: [Egress Profiles]
      summary: Replace one owner-scoped egress profile
      operationId: updateEgressProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEgressProfileRequest'
      responses:
        '200':
          description: Updated egress profile
          content:
            application/json:
              schema:
