services:
  egress-tls-proxy:
    image: "${BPANE_EGRESS_MITMPROXY_IMAGE:-mitmproxy/mitmproxy:11.0.2}"
    container_name: bpane-egress-tls-observer
    command:
      - mitmdump
      - --mode
      - regular
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "3129"
      - --set
      - confdir=/mitmproxy
      - --set
      - flow_detail=1
      - --set
      - showhost=true
    ports:
      - "${BPANE_EGRESS_TLS_OBSERVER_PORT:-3129}:3129"
    volumes:
      - ../../../dev/egress-mitmproxy:/mitmproxy
    networks:
      bpane-internal:
        aliases:
          - bpane-egress-tls-observer

networks:
  bpane-internal:
    external: true
    name: "${BPANE_EGRESS_OBSERVER_NETWORK:-deploy_bpane-internal}"
