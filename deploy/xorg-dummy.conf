Section "Device"
    Identifier "dummy"
    Driver "dummy"
    # 256MB video RAM — enough for up to 4K resolution
    VideoRam 256000
EndSection

Section "Screen"
    Identifier "screen"
    Device "dummy"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        # Virtual framebuffer up to 4K — xrandr can resize within this
        Virtual 3840 2160
    EndSubSection
EndSection

Section "ServerFlags"
    # Don't terminate on idle
    Option "DontZap" "true"
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection

# Ensure Composite extension is enabled (required for XComposite redirect).
# Damage and MIT-SHM are always loaded by xserver-xorg-core.
Section "Extensions"
    Option "Composite" "Enable"
EndSection
