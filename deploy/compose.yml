# BrowserPane Local Development Stack
#
# Usage:
#   ./deploy/gen-dev-cert.sh dev/certs   # generate TLS cert (once)
#   docker compose -f deploy/compose.yml up --build
#
# Then open http://localhost:8080 in Chrome and log in.
#
# To exercise real multi-session runtime workers locally, start the stack with:
#   BPANE_GATEWAY_RUNTIME_BACKEND=docker_pool \
#   BPANE_GATEWAY_MAX_ACTIVE_RUNTIMES=2 \
#   docker compose -f deploy/compose.yml up --build
#
# The current runtime SPKI fingerprint is also served at:
#   http://localhost:8080/cert-fingerprint
# For Chrome:
#   --ignore-certificate-errors-spki-list=$(curl -fsS http://localhost:8080/cert-fingerprint)
#
# Services:
#   host      - Linux host agent (Xvfb + xterm)
#   gateway   - WebTransport relay (port 4433)
#   web       - nginx frontend (port 8080)
#   keycloak  - local OIDC provider for dev/testing (port 8091)
#   postgres  - session control-plane database
#   mcp-bridge - MCP SSE server for Claude Code (port 8931)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: browserpane
      POSTGRES_USER: browserpane
      POSTGRES_PASSWORD: browserpane-dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U browserpane -d browserpane"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - bpane-postgres-data:/var/lib/postgresql/data
    networks:
      - bpane-internal

  vault:
    image: hashicorp/vault:1.19
    command:
      - server
      - -dev
      - -dev-root-token-id=browserpane-dev-root
      - -dev-listen-address=0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - bpane-internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8091
    ports:
      - "8091:8080"
    volumes:
      - ./keycloak/browserpane-dev-realm.json:/opt/keycloak/data/import/browserpane-dev-realm.json:ro
    networks:
      - bpane-internal

  host:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.host
    security_opt:
      # Allow Chromium sandbox namespace setup inside the container.
      - seccomp=unconfined
    env_file:
      - ./host-runtime.env
    # MIT-SHM requires sufficient /dev/shm for framebuffer transfer
    # (3840x2160x4 = ~33MB; 64MB default may be tight with headroom)
    shm_size: '128m'
    # Camera relay stays disabled in the default dev stack.
    # To enable it, create a v4l2loopback device on the Docker host and mount it
    # into the container via a compose override, for example:
    # devices:
    #   - "${BPANE_CAMERA_DEVICE:-/dev/video0}:${BPANE_CAMERA_DEVICE:-/dev/video0}"
    volumes:
      - agent-socket:/run/bpane
    networks:
      bpane-internal:
        ipv4_address: 172.28.0.10

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    command: >
      /usr/local/bin/bpane-gateway
      --agent-socket ${BPANE_GATEWAY_AGENT_SOCKET:-/run/bpane/agent.sock}
      --runtime-backend ${BPANE_GATEWAY_RUNTIME_BACKEND:-static_single}
      --port 4433
      --max-viewers 10
      --max-active-runtimes ${BPANE_GATEWAY_MAX_ACTIVE_RUNTIMES:-2}
      --max-starting-runtimes ${BPANE_GATEWAY_MAX_STARTING_RUNTIMES:-1}
      --runtime-cdp-endpoint ${BPANE_GATEWAY_RUNTIME_CDP_ENDPOINT:-http://host:9223}
      --docker-runtime-image ${BPANE_GATEWAY_DOCKER_RUNTIME_IMAGE:-deploy-host}
      --docker-runtime-network ${BPANE_GATEWAY_DOCKER_RUNTIME_NETWORK:-deploy_bpane-internal}
      --docker-runtime-volume ${BPANE_GATEWAY_DOCKER_RUNTIME_VOLUME:-deploy_agent-socket}
      --docker-runtime-env-file ${BPANE_GATEWAY_DOCKER_RUNTIME_ENV_FILE:-/runtime/host-runtime.env}
      --docker-runtime-cdp-proxy-port ${BPANE_GATEWAY_DOCKER_RUNTIME_CDP_PROXY_PORT:-9223}
      --docker-runtime-seccomp-unconfined
      --oidc-issuer http://localhost:8091/realms/browserpane-dev
      --oidc-audience bpane-gateway
      --oidc-jwks-url http://keycloak:8080/realms/browserpane-dev/protocol/openid-connect/certs
      --database-url postgres://browserpane:browserpane-dev@postgres:5432/browserpane
      --credential-vault-addr ${BPANE_CREDENTIAL_VAULT_ADDR:-http://vault:8200}
      --credential-vault-token ${BPANE_CREDENTIAL_VAULT_TOKEN:-browserpane-dev-root}
      --credential-vault-mount-path ${BPANE_CREDENTIAL_VAULT_MOUNT_PATH:-secret}
      --credential-vault-prefix ${BPANE_CREDENTIAL_VAULT_PREFIX:-browserpane/credential-bindings}
      --public-gateway-url https://localhost:4433
      --cert /certs/cert.pem
      --key /certs/cert.key
      --workflow-worker-docker-bin ${BPANE_WORKFLOW_WORKER_DOCKER_BIN:-docker}
      --workflow-worker-image ${BPANE_WORKFLOW_WORKER_IMAGE:-deploy-workflow-worker}
      --workflow-worker-max-active ${BPANE_WORKFLOW_WORKER_MAX_ACTIVE:-0}
      --workflow-worker-network ${BPANE_WORKFLOW_WORKER_NETWORK:-deploy_bpane-internal}
      --workflow-worker-container-name-prefix ${BPANE_WORKFLOW_WORKER_CONTAINER_NAME_PREFIX:-bpane-workflow}
      --workflow-worker-api-url ${BPANE_WORKFLOW_WORKER_API_URL:-http://gateway:8932}
      --workflow-worker-work-root ${BPANE_WORKFLOW_WORKER_WORK_ROOT:-/tmp/bpane-workflows}
      --workflow-worker-oidc-token-url ${BPANE_WORKFLOW_WORKER_OIDC_TOKEN_URL:-http://keycloak:8080/realms/browserpane-dev/protocol/openid-connect/token}
      --workflow-worker-oidc-client-id ${BPANE_WORKFLOW_WORKER_OIDC_CLIENT_ID:-bpane-mcp-bridge}
      --workflow-worker-oidc-client-secret ${BPANE_WORKFLOW_WORKER_OIDC_CLIENT_SECRET:-bpane-mcp-bridge-secret}
    ports:
      - "4433:4433/udp"
      - "4433:4433/tcp"
      - "8932:8932/tcp"
    volumes:
      - agent-socket:/run/bpane
      - /var/run/docker.sock:/var/run/docker.sock
      - ./host-runtime.env:/runtime/host-runtime.env:ro
      - ../dev/certs:/certs:ro
      - ..:/workspace:ro
    depends_on:
      host:
        condition: service_started
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - bpane-internal

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "8080:8080"
    environment:
      BPANE_AUTH_MODE: oidc
      BPANE_OIDC_PROVIDER_HINT: keycloak
      BPANE_OIDC_ISSUER: http://localhost:8091/realms/browserpane-dev
      BPANE_OIDC_CLIENT_ID: bpane-web
      BPANE_OIDC_SCOPE: openid
      BPANE_OIDC_EXAMPLE_USERNAME: demo
      BPANE_OIDC_EXAMPLE_PASSWORD: demo-demo
      BPANE_MCP_BRIDGE_CONTROL_URL: http://localhost:8931/control-session
      BPANE_MCP_BRIDGE_CLIENT_ID: bpane-mcp-bridge
      BPANE_MCP_BRIDGE_ISSUER: http://localhost:8091/realms/browserpane-dev
      BPANE_MCP_BRIDGE_DISPLAY_NAME: BrowserPane MCP bridge
    volumes:
      - ../dev/certs:/usr/share/nginx/html/certs:ro
    depends_on:
      - gateway
      - keycloak
    networks:
      - bpane-internal

  mcp-bridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp-bridge
    environment:
      BPANE_GATEWAY_API_URL: "http://gateway:8932"
      BPANE_CDP_ENDPOINT: "http://host:9223"
      BPANE_MCP_PORT: "8931"
      BPANE_MCP_RESOLUTION: "1600x900"
      BPANE_SESSION_BOOTSTRAP_MODE: "off"
      BPANE_GATEWAY_OIDC_TOKEN_URL: "http://keycloak:8080/realms/browserpane-dev/protocol/openid-connect/token"
      BPANE_GATEWAY_OIDC_CLIENT_ID: "bpane-mcp-bridge"
      BPANE_GATEWAY_OIDC_CLIENT_SECRET: "bpane-mcp-bridge-secret"
      BPANE_GATEWAY_OIDC_SCOPES: ""
    ports:
      - "8931:8931"
    depends_on:
      - gateway
      - host
      - keycloak
    networks:
      - bpane-internal

  workflow-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.workflow-worker
    profiles: ["workflow"]
    environment:
      BPANE_GATEWAY_API_URL: "http://gateway:8932"
      BPANE_GATEWAY_OIDC_TOKEN_URL: "http://keycloak:8080/realms/browserpane-dev/protocol/openid-connect/token"
      BPANE_GATEWAY_OIDC_CLIENT_ID: "bpane-mcp-bridge"
      BPANE_GATEWAY_OIDC_CLIENT_SECRET: "bpane-mcp-bridge-secret"
      BPANE_GATEWAY_OIDC_SCOPES: ""
      BPANE_WORKFLOW_WORK_ROOT: "/tmp/bpane-workflows"
    depends_on:
      - gateway
      - keycloak
      - host
    networks:
      - bpane-internal

volumes:
  agent-socket:
  bpane-postgres-data:

networks:
  bpane-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
