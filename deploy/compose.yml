# BrowserPane Local Development Stack
#
# Usage:
#   ./deploy/gen-dev-cert.sh dev/certs   # generate TLS cert (once)
#   docker compose -f deploy/compose.yml up --build
#
# Then open http://localhost:8080 in Chrome and click "Connect".
#
# The SPKI fingerprint is in dev/certs/cert-fingerprint.txt.
# For Chrome: --ignore-certificate-errors-spki-list=$(cat dev/certs/cert-fingerprint.txt)
#
# Services:
#   host     - Linux host agent (Xvfb + xterm)
#   gateway  - WebTransport relay (port 4433)
#   web      - nginx frontend (port 8080)
#   mcp-bridge - MCP SSE server for Claude Code (port 8931)

services:
  host:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.host
    security_opt:
      # Allow Chromium sandbox namespace setup inside the container.
      - seccomp=unconfined
    environment:
      # H.264 encoder mode:
      # - off: disable H.264 entirely (tiles only)
      # - video_tiles: enable only when tile classifier marks video regions
      # - always: keep encoder process running continuously
      BPANE_H264_MODE: "video_tiles"
      # Video quality knobs (H.264 x264)
      BPANE_H264_BITRATE: "12M"
      BPANE_H264_MAXRATE: "16M"
      BPANE_H264_BUFSIZE: "6M"
      BPANE_H264_PRESET: "ultrafast"   # prioritize latency over compression
      BPANE_H264_PROFILE: "baseline"
      BPANE_H264_LEVEL: "4.2"
      BPANE_H264_TUNE: "zerolatency"
      BPANE_H264_BFRAMES: "0"          # keep low latency; raise to 2 for better compression if latency allows
      # GOP_MULT is intentionally omitted — uses the default of 0.25
      # (keyframe every ~250ms at 60fps = GOP 15). Shorter GOP means faster
      # artifact recovery at the cost of slightly more bandwidth.
      # Optional: set BPANE_H264_CRF (e.g., 20) to prefer constant quality over strict bitrate
      BPANE_FPS: "60"
      # Require reasonably large video surfaces before enabling ROI video.
      # This prevents small previews/mini players from triggering H.264.
      BPANE_CDP_MIN_VIDEO_WIDTH: "480"
      BPANE_CDP_MIN_VIDEO_HEIGHT: "270"
      BPANE_CDP_MIN_VIDEO_AREA_RATIO: "0.12"
      # Pause page videos while scrolling (via CDP Runtime.evaluate hook).
      BPANE_CDP_PAUSE_VIDEOS_ON_SCROLL: "true"
      BPANE_CDP_SCROLL_PAUSE_WINDOW_MS: "900"
      # Only arm ROI video for a short period after a left click inside a detected video region.
      BPANE_VIDEO_CLICK_ARM_MS: "8000"
      # Audio codec: "adpcm" (default) or "opus" (24x smaller)
      BPANE_AUDIO_CODEC: "opus"
      # Tile compression codec: "qoi" (default) or "zstd"
      BPANE_TILE_CODEC: "zstd"
      RUST_LOG: "info,bpane_host=debug"
      # Load local test page for scroll debugging
      BPANE_URL: "https://news.google.com/home?hl=en-US&gl=US&ceid=US:en"
      # UI scaling for readability
      BPANE_DPI: "150"
      GDK_SCALE: "3"
      GDK_DPI_SCALE: "0.8"
    # MIT-SHM requires sufficient /dev/shm for framebuffer transfer
    # (3840x2160x4 = ~33MB; 64MB default may be tight with headroom)
    shm_size: '128m'
    # Camera relay stays disabled in the default dev stack.
    # To enable it, create a v4l2loopback device on the Docker host and mount it
    # into the container via a compose override, for example:
    # devices:
    #   - "${BPANE_CAMERA_DEVICE:-/dev/video0}:${BPANE_CAMERA_DEVICE:-/dev/video0}"
    volumes:
      - agent-socket:/run/bpane
    networks:
      bpane-internal:
        ipv4_address: 172.28.0.10

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    command: >
      /usr/local/bin/bpane-gateway
      --agent-socket /run/bpane/agent.sock
      --port 4433
      --max-viewers 10
      --cert /certs/cert.pem
      --key /certs/cert.key
      --token-file /shared/token
    ports:
      - "4433:4433/udp"
      - "4433:4433/tcp"
    volumes:
      - agent-socket:/run/bpane
      - web-shared:/shared
      - ../dev/certs:/certs:ro
    depends_on:
      - host
    networks:
      - bpane-internal

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "8080:8080"
    volumes:
      - web-shared:/usr/share/nginx/html/shared:ro
      - ../dev/certs:/usr/share/nginx/html/certs:ro
    depends_on:
      - gateway
    networks:
      - bpane-internal

  mcp-bridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp-bridge
    environment:
      BPANE_GATEWAY_API_URL: "http://gateway:8932"
      BPANE_CDP_ENDPOINT: "http://172.28.0.10:9223"
      BPANE_MCP_PORT: "8931"
      BPANE_MCP_RESOLUTION: "1600x900"
    ports:
      - "8931:8931"
    depends_on:
      - gateway
      - host
    networks:
      - bpane-internal

volumes:
  agent-socket:
  web-shared:

networks:
  bpane-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
