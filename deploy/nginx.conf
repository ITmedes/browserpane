server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the token file written by the gateway
    location = /token {
        alias /usr/share/nginx/html/shared/token;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    # Serve the cert hash for WebTransport serverCertificateHashes
    location = /cert-hash {
        alias /usr/share/nginx/html/certs/cert-hash.txt;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }
}
