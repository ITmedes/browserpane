server {
    listen 8080;
    server_name localhost;
    resolver 127.0.0.11 ipv6=off valid=5s;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the cert hash for WebTransport serverCertificateHashes
    location = /cert-hash {
        alias /usr/share/nginx/html/cert-hash.txt;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location = /cert-fingerprint {
        alias /usr/share/nginx/html/cert-fingerprint.txt;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location = /auth-config.json {
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location ^~ /api/ {
        set $gateway_api http://gateway:8932;
        proxy_pass $gateway_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    location = /admin {
        return 302 /admin/;
    }

    location ^~ /admin/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ =404;
    }
}
